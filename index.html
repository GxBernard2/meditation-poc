<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Méditation — POC</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; background: #04070d; overflow: hidden; }
  body { font-family: -apple-system, system-ui, sans-serif; color: #cdd9ee; }
  #stage { display: block; width: 100vw; height: 100vh; }
  #hud   { position: fixed; top: env(safe-area-inset-top, 18px); left: 0; right: 0;
           text-align: center; font-size: 14px; letter-spacing: .06em; color: #6a7e9c; }
  #timer { position: fixed; bottom: 12%; left: 0; right: 0; text-align: center;
           font-size: 44px; font-variant-numeric: tabular-nums; color: #dce8ff; }
  #status{ position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
           padding: 24px; text-align: center; font-size: 16px; line-height: 1.5; color: #aebfd6;
           background: #04070d; z-index: 5; }
  #status button { display:block; margin: 18px auto 0; padding: 16px 28px; font-size: 17px;
           border: 0; border-radius: 14px; background: #2f6dbf; color: #fff; }
  #video { display: none; }
  #dbg   { position: fixed; bottom: 8px; left: 8px; font-size: 11px; color: #2f435e; }
</style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div id="hud"></div>
  <div id="timer"></div>
  <div id="dbg"></div>
  <video id="video" playsinline></video>
  <div id="status"><div id="statusText">Préparation…<button id="go">Démarrer</button></div></div>

<script type="module">
import { FaceLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18";

const TARGET_MS = 60000, CLOSE_THRESHOLD = 0.5, DEBOUNCE_MS = 250, COUNTDOWN_S = 5, BREATH_PERIOD_S = 10;

const cv = document.getElementById("stage"), ctx = cv.getContext("2d");
const hud = document.getElementById("hud"), timerEl = document.getElementById("timer");
const dbg = document.getElementById("dbg"), video = document.getElementById("video");
const statusBox = document.getElementById("status"), statusText = document.getElementById("statusText");
let DPR = Math.min(devicePixelRatio || 1, 2), W = 0, H = 0;
function resize(){ const r = cv.getBoundingClientRect(); W = r.width; H = r.height;
  cv.width = W*DPR; cv.height = H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener("resize", resize);
function setStatus(msg){ statusText.innerHTML = msg; statusBox.style.display = "flex"; }
function hideStatus(){ statusBox.style.display = "none"; }

let landmarker, running = false;
let openL = 1, openR = 1, bothClosed = false, pending = false, pendingSince = 0;
let closedMix = 0, phase = "countdown", cdStart = 0, accMs = 0, last = 0;

const AC = new (window.AudioContext || window.webkitAudioContext)();
function chime(f=528, d=1.8, g=0.25){ const o=AC.createOscillator(), gn=AC.createGain();
  o.type="sine"; o.frequency.value=f; o.connect(gn); gn.connect(AC.destination);
  gn.gain.setValueAtTime(0.0001, AC.currentTime);
  gn.gain.exponentialRampToValueAtTime(g, AC.currentTime+0.05);
  gn.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+d); o.start(); o.stop(AC.currentTime+d); }

function drawEye(cx,cy,w,h,o){ const hw=w/2, lid=Math.max(0.015,o)*(h/2);
  ctx.beginPath(); ctx.moveTo(cx-hw,cy); ctx.quadraticCurveTo(cx,cy-lid,cx+hw,cy);
  ctx.quadraticCurveTo(cx,cy+lid,cx-hw,cy); ctx.closePath();
  ctx.lineWidth=2.4; ctx.strokeStyle=`rgba(180,210,255,${0.45+0.55*o})`;
  ctx.shadowColor="rgba(120,170,255,0.8)"; ctx.shadowBlur=16*o+6; ctx.stroke();
  if(o>0.28){ const k=(o-0.28)/0.72; ctx.beginPath(); const rad=Math.min(lid*0.7,hw*0.32)*k;
    ctx.arc(cx,cy,Math.max(rad,0.5),0,Math.PI*2); ctx.fillStyle=`rgba(150,195,255,${0.85*k})`; ctx.fill(); }
  ctx.shadowBlur=0; }
function drawWave(t,env){ const mid=H/2, L=[[60,1.5,0.6,0.85,2.4],[42,2.4,-0.95,0.6,1.7],[30,3.7,1.5,0.35,1.1]];
  for(const a of L){ ctx.beginPath();
    for(let x=0;x<=W;x+=3){ const p=x/W, tp=Math.sin(p*Math.PI);
      const y=mid+Math.sin(p*Math.PI*2*a[1]+t*a[2])*a[0]*env*tp; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
    ctx.strokeStyle=`rgba(130,200,255,${a[3]})`; ctx.lineWidth=a[4];
    ctx.shadowColor="rgba(120,185,255,0.7)"; ctx.shadowBlur=14; ctx.stroke(); }
  ctx.shadowBlur=0; }

// CHANGEMENT : le modèle se charge dès le départ, on garde la promesse
const modelReady = (async () => {
  const fs = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm");
  landmarker = await FaceLandmarker.createFromOptions(fs, {
    baseOptions: { modelAssetPath:
      "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate: "GPU" },
    outputFaceBlendshapes: true, runningMode: "VIDEO", numFaces: 1 });
})();

async function start(){
  // CHANGEMENT : caméra d'abord, avec message d'erreur lisible
  setStatus("Activation de la caméra…");
  if (AC.state === "suspended") { try { await AC.resume(); } catch(e){} }
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:"user" }, audio:false });
  } catch (e) {
    setStatus(`Caméra indisponible (${e.name}).<br>Il faut servir la page en HTTPS ou via localhost, pas en ouvrant le fichier directement.`);
    return;
  }
  video.srcObject = stream; await video.play();

  // CHANGEMENT : on attend que le modèle soit prêt avant de lancer la boucle
  setStatus("Chargement du modèle…");
  try { await modelReady; }
  catch (e) { setStatus("Modèle non chargé : " + e.message + "<br>Vérifie ta connexion."); return; }

  hideStatus();
  running = true; last = performance.now(); cdStart = performance.now();
  requestAnimationFrame(loop);
}

function loop(now){
  if (!running) return;
  const dt = now - last; last = now;

  let faceSeen = false;
  // CHANGEMENT : garde sur la taille vidéo + try/catch sur la détection
  if (landmarker && video.videoWidth > 0){
    try {
      const res = landmarker.detectForVideo(video, now);
      const bs = res.faceBlendshapes?.[0]?.categories;
      if (bs && bs.length){ faceSeen = true;
        const bl = bs.find(c=>c.categoryName==="eyeBlinkLeft")?.score ?? 0;
        const br = bs.find(c=>c.categoryName==="eyeBlinkRight")?.score ?? 0;
        openL = 1 - bl; openR = 1 - br;
        const closedNow = bl > CLOSE_THRESHOLD && br > CLOSE_THRESHOLD;
        if (closedNow !== pending){ pending = closedNow; pendingSince = now; }
        else if (now - pendingSince > DEBOUNCE_MS && closedNow !== bothClosed){
          bothClosed = closedNow; chime(bothClosed ? 528 : 396, 1.4, 0.18);
        }
        dbg.textContent = `L ${bl.toFixed(2)}  R ${br.toFixed(2)}`;
      }
    } catch (err) { dbg.textContent = "detect: " + err.message; }
  }
  if (!faceSeen){ bothClosed = false; if(!dbg.textContent.startsWith("detect")) dbg.textContent = "visage non détecté"; }

  closedMix += ((bothClosed?1:0) - closedMix) * Math.min(1, dt/280);

  if (phase === "countdown"){
    const el = (now - cdStart)/1000, c = Math.ceil(-COUNTDOWN_S + el);
    hud.textContent = "Fermez les yeux"; timerEl.textContent = c < 0 ? c : "0";
    if (el >= COUNTDOWN_S) phase = "session";
  } else if (phase === "session"){
    if (bothClosed) accMs += dt;
    const s = Math.floor(accMs/1000);
    timerEl.textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
    hud.textContent = bothClosed ? "" : (faceSeen ? "On reprend à la fermeture" : "Revenez dans le cadre");
    if (accMs >= TARGET_MS){ phase = "done"; chime(660, 2.6, 0.3); }
  } else if (phase === "done"){
    hud.textContent = "Merci · Bravo";
    const s = Math.floor(accMs/1000);
    timerEl.textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  }

  ctx.clearRect(0,0,W,H);
  const t = now/1000;
  if (closedMix < 0.98){ ctx.globalAlpha = 1 - closedMix;
    const ew = Math.min(W*0.22, 150), gap = ew*1.15;
    drawEye(W/2 - gap/2, H/2, ew, ew*0.8, openL);
    drawEye(W/2 + gap/2, H/2, ew, ew*0.8, openR); ctx.globalAlpha = 1; }
  if (closedMix > 0.02){ ctx.globalAlpha = closedMix;
    const env = phase === "done" ? 0.22 : 0.45 + 0.45*Math.sin(t*(2*Math.PI/BREATH_PERIOD_S));
    drawWave(t, env); ctx.globalAlpha = 1; }
  requestAnimationFrame(loop);
}

document.getElementById("go").addEventListener("click", start);
resize();
setStatus('Préparation…<button id="go2">Démarrer</button>');
// (le bouton initial du HTML reste actif ; ce setStatus garantit l'affichage)
statusText.innerHTML = 'Prêt.<button id="go">Démarrer</button>';
document.getElementById("go").addEventListener("click", start);
</script>
</body>
</html>
